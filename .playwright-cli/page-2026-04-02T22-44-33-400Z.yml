                - generic [ref=e50]:
                    - paragraph [ref=e51]:
                        - strong [ref=e52]: NASA se prepara para un paso histórico en la exploración espacial humana con Artemis II
                    - paragraph [ref=e53]: En un momento crucial de la historia del vuelo espacial humano, la agencia espacial norteamericana NASA está a punto de lanzar su segunda misión en el programa Artemis. Con Artemis II, la agencia espacial estadounidense hará un paso sin precedentes hacia la exploración lunar y más allá. Esta misión, que se estima que será la más larga y desafiante hasta la fecha, tiene como objetivo establecer una presencia lunar duradera y enviar estadounidenses a Marte.
                    - paragraph [ref=e54]: La misión Artemis II es el resultado de años de trabajo y planificación, y es considerada un paso fundamental hacia la reanudación de las misiones tripuladas a la Luna. “Artemis II será un paso hacia adelante crucial en la historia del vuelo espacial humano”, declaró Jared Isaacman, administrador de NASA. “Esta misión histórica enviará seres humanos más allá de la Tierra que nunca antes y recopilará los conocimientos necesarios para regresar a la Luna”.
                    - paragraph [ref=e55]: 'La campaña Artemis tiene como objetivo alcanzar tres objetivos fundamentales: beneficiar la economía estadounidense, realizar descubrimientos científicos importantes y preparar las misiones tripuladas a Marte. La misión Artemis II es un paso crucial en este camino, ya que se estima que la agencia espacial estadounidense podrá enviar astronautas a una distancia mayor que cualquier tripulación anterior.'
                    - paragraph [ref=e56]: La preparación para esta misión ha sido intensa, con los astronautas y el equipo de NASA trabajando incansablemente para asegurarse de que todo esté listo. El kit de prensa oficial para la misión Artemis II ahora está disponible, incluyendo información sobre los astronautas que llevarán a cabo la misión y otros recursos para medios.
                    - paragraph [ref=e57]: “Artemis II representa el avance hacia la establecimiento de una presencia lunar duradera y enviar estadounidenses a Marte”, añadió Isaacman. “No puedo estar más impresionado por nuestro equipo de NASA y por el equipo Artemis II, y les deseo todo lo mejor. ¡Avancemos con firmeza!”
                    - paragraph [ref=e58]: Con la misión Artemis II a punto de despegar, la comunidad científica y espacial se está emocionando ante la posibilidad de ver a los astronautas estadounidenses en acción. ¿Cuáles son tus expectativas para esta misión histórica? ¿Cómo crees que afectará la exploración lunar y la búsqueda de vida extraterrestre? Comparte tus pensamientos con nosotros.
                    - paragraph [ref=e59]:
