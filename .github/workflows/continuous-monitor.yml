name: Continuous Monitor

on:
  schedule:
    # Weekly on Mondays at 08:13 UTC
    - cron: '13 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          IMAGE_DERIVATIVES_REQUIRE_URL: 0
          IMAGE_DERIVATIVES_STRICT: 0

      - name: Broken link checker
        id: links
        run: node scripts/broken-link-checker.js
        continue-on-error: true

      - name: Dist sanity
        run: npm run test:dist

      - name: Create monitoring issue on failure
        if: failure()
        uses: actions/github-script@df52d1e8363f5c98429825cd7c4068346a38e93a # v7.0.0
        with:
          script: |
            const title = '🔍 Monitor Continuo: Fallos detectados';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'El monitor continuo semanal detectó fallos.',
              '',
              `- [Ver ejecución](${runUrl})`,
              '- Posibles causas: enlaces rotos, fallos en dist sanity, o errores de build.',
              '',
              'Revisa el log de la acción para más detalles.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['monitoring'],
            });
