name: Content Guard

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: content-guard-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_CONTRACT_REPOSITORY: cortega26/noticiencias_news_collector
  BACKEND_CONTRACT_REF: main
  BACKEND_CONTRACT_SCHEMA_PATH: news_collector/contracts/frontend_schema.py

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 🧹 Lint (ESLint + Prettier)
        run: npm run lint

      - name: 🔍 Frontmatter & Type Validation
        run: npm run validate:content

      - name: Checkout back-end schema (sparse)
        id: backend_checkout
        # Secrets are not available in fork or Dependabot PRs
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]') }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.BACKEND_CONTRACT_REPOSITORY }}
          ref: ${{ env.BACKEND_CONTRACT_REF }}
          token: ${{ secrets.NOTICIENCIAS_BACKEND_READ_TOKEN }}
          path: _backend_sparse
          sparse-checkout: |
            news_collector/contracts/frontend_schema.py
          sparse-checkout-cone-mode: false

      - name: 🔗 Contract Parity Gate
        # Always runs: uses live backend schema when available, falls back to committed snapshot
        run: |
          LIVE_SCHEMA="_backend_sparse/${{ env.BACKEND_CONTRACT_SCHEMA_PATH }}"
          SNAPSHOT=".contract-snapshots/frontend_schema.snapshot.json"

          if [ -f "$LIVE_SCHEMA" ]; then
            echo "::notice::Using live backend schema from sparse checkout."
            BACKEND_SCHEMA_PATH="$LIVE_SCHEMA" npm run check:contract-sync
          elif [ -f "$SNAPSHOT" ]; then
            echo "::warning::Backend schema not available (fork/Dependabot?). Using committed snapshot."
            node scripts/check-contract-sync.js --snapshot "$SNAPSHOT" src/content.config.ts
          else
            echo "::error::Neither live backend schema nor snapshot found. Cannot verify contract parity."
            exit 1
          fi

      - name: 🔗 Link Checker
        uses: lycheeverse/lychee-action@7cd0af4c74a61395d455af97419279d86aafaede # v2.0.2
        with:
          args: --no-progress --exclude scientificamerican.com --exclude techxplore.com --exclude nasa.gov --exclude www.nasa.gov './src/content/**/*.md'
          fail: true

  build:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Astro image cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.astro
          key: >-
            ${{ runner.os }}-astro-images-v2-${{ hashFiles('package-lock.json', 'astro.config.mjs',
            'src/components/common/Image.astro', 'src/utils/images.ts',
            'src/utils/images-optimization.ts') }}-${{ hashFiles('src/assets/images/**') }}
          restore-keys: |
            ${{ runner.os }}-astro-images-v2-${{ hashFiles('package-lock.json', 'astro.config.mjs', 'src/components/common/Image.astro', 'src/utils/images.ts', 'src/utils/images-optimization.ts') }}-
            ${{ runner.os }}-astro-images-v2-

      - name: 🏗️ Build Frontend
        run: npm run build

      - name: 🧪 Dist Sanity
        run: npm run test:dist

      - name: ✅ Audit Suite
        run: npm run test:audit
