name: Content Guard

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_CONTRACT_REPOSITORY: cortega26/noticiencias_news_collector
  BACKEND_CONTRACT_REF: main
  BACKEND_CONTRACT_SCHEMA_PATH: news_collector/contracts/frontend_schema.py

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 🧹 Lint (ESLint + Prettier)
        run: npm run lint

      - name: 🔍 Frontmatter & Type Validation
        run: npm run validate:content

      - name: Skip cross-repo contract parity on forked pull requests
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "::notice::Skipping cross-repo contract parity gate for forked pull requests because repository secrets are not available."

      - name: Verify back-end contract checkout access
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.NOTICIENCIAS_BACKEND_READ_TOKEN }}" ]; then
            echo "::error::Missing NOTICIENCIAS_BACKEND_READ_TOKEN secret with read access to $BACKEND_CONTRACT_REPOSITORY."
            exit 1
          fi

      - name: Checkout back-end schema (sparse)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.BACKEND_CONTRACT_REPOSITORY }}
          ref: ${{ env.BACKEND_CONTRACT_REF }}
          token: ${{ secrets.NOTICIENCIAS_BACKEND_READ_TOKEN }}
          path: _backend_sparse
          sparse-checkout: |
            news_collector/contracts/frontend_schema.py
          sparse-checkout-cone-mode: false

      - name: 🔗 Contract Parity Gate
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: npm run check:contract-sync
        env:
          BACKEND_SCHEMA_PATH: _backend_sparse/news_collector/contracts/frontend_schema.py

      - name: 🔗 Link Checker
        uses: lycheeverse/lychee-action@7cd0af4c74a61395d455af97419279d86aafaede # v2.0.2
        with:
          args: --no-progress --exclude scientificamerican.com --exclude techxplore.com --exclude nasa.gov --exclude www.nasa.gov './src/content/**/*.md'
          fail: true

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 🏗️ Build Frontend
        run: npm run build

      - name: 🧪 Dist Sanity
        run: npm run test:dist

      - name: ✅ Audit Suite
        run: npm run test:audit
