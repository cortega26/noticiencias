name: Content Guard
on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (Pinning config)

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: 🔍 Frontmatter & Type Validation
        run: npm run validate:content

      - name: 🏗️ Build Frontend
        run: npm run build

      - name: 🧪 Dist Sanity
        run: npm run test:dist

      - name: ✅ Audit Suite
        run: npm run test:audit

      - name: 🔗 Link Checker
        uses: lycheeverse/lychee-action@7cd0af4c74a61395d455af97419279d86aafaede # v2.0.2
        with:
          args: --no-progress --exclude scientificamerican.com --exclude techxplore.com --exclude nasa.gov --exclude www.nasa.gov './src/content/**/*.md'
          fail: true
