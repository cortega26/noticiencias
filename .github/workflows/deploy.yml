name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
  R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
  R2_PUBLIC_BASE_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_BASE_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report image delivery mode
        run: |
          node --input-type=module <<'EOF'
          import { getImageDeliveryMode } from './src/utils/image-delivery-mode.js';

          const mode = getImageDeliveryMode();

          if (mode === 'r2') {
            console.log('::notice::Image delivery mode is r2; builds will require CDN-backed derivatives when needed.');
          } else {
            console.log('::notice::Image delivery mode is github; builds will emit local Astro-managed assets and skip R2 derivative uploads.');
          }
          EOF

      - name: Build site
        run: npm run build

      - name: Run Site Integrity Test Suite
        run: npm run test:audit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Source for Verification
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        env:
          # actions/deploy-pages@v5 bundles the deprecated `punycode` module in its compiled runtime.
          # Suppress only DEP0040 here so the deploy log stays clean until upstream removes that dependency.
          NODE_OPTIONS: --disable-warning=DEP0040

      - name: Verify Deployment
        env:
          DEPLOY_CHECK_MODE: hybrid
        run: npm run test:deploy -- ${{ steps.deployment.outputs.page_url }}
