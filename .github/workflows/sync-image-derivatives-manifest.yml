name: Sync Image Derivatives Manifest

on:
  push:
    branches:
      - 'content/update-*'
    paths:
      - 'src/content/posts/**'
      - 'src/assets/images/**'

permissions:
  contents: write

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish image derivatives manifest
        run: npm run publish:image-derivatives

      - name: Commit manifest update when needed
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/image-derivatives-manifest.json
          if git diff --cached --quiet; then
            echo "Image derivatives manifest already up to date."
            exit 0
          fi
          git commit -m "chore: sync image derivatives manifest"
          git push origin "HEAD:$TARGET_BRANCH"
